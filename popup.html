<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Song Comment</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      font-size: 13px;
      background: #fff;
      color: #333;
      padding: 0;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px;
      background: #f8f9fa;
      border-bottom: 1px solid #e0e0e0;
    }
    .header-icon {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      object-fit: contain;
      background: #fff;
      border: 1px solid #e0e0e0;
    }
    .header-text { flex: 1; }
    .header-title {
      font-size: 15px;
      font-weight: 600;
      color: #222;
    }
    .header-subtitle {
      font-size: 11px;
      color: #888;
      margin-top: 2px;
    }
    .section {
      padding: 12px 16px;
      border-bottom: 1px solid #f0f0f0;
    }
    .section:last-of-type { border-bottom: none; }
    .section-title {
      font-size: 11px;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }
    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
    }
    .label {
      color: #666;
      font-size: 12px;
    }
    .value {
      font-size: 12px;
      color: #333;
      text-align: right;
      max-width: 160px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .value.good { color: #22c55e; }
    .value.bad { color: #ef4444; }
    .value.pending { color: #f59e0b; }
    #clear-cache {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      background: #f8f9fa;
      color: #555;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-family: inherit;
      transition: all 0.2s;
    }
    #clear-cache:hover { 
      background: #e8e8e8;
      border-color: #ccc;
    }
    #clear-cache:active { background: #ddd; }
    #status-msg {
      text-align: center;
      font-size: 12px;
      color: #22c55e;
      margin-top: 8px;
      min-height: 18px;
      opacity: 0;
      transition: opacity 0.3s;
    }
    #status-msg.show { opacity: 1; }
    .footer {
      text-align: center;
      padding: 12px;
      font-size: 10px;
      color: #aaa;
      background: #fafafa;
    }
  </style>
</head>
<body>
  <div class="header">
    <img class="header-icon" src="icons/icon.png" alt="logo" />
    <div class="header-text">
      <div class="header-title">Song Comment</div>
      <div class="header-subtitle" id="version-text">Song Comment</div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">当前播放</div>
    <div class="row">
      <span class="label">歌曲</span>
      <span class="value" id="current-song">-</span>
    </div>
    <div class="row">
      <span class="label">评论数</span>
      <span class="value" id="comment-count">-</span>
    </div>
  </div>

  <div class="section">
    <div class="section-title">状态</div>
    <div class="row">
      <span class="label">API</span>
      <span class="value" id="api-url">127.0.0.1:6521</span>
    </div>
    <div class="row">
      <span class="label">登录</span>
      <span class="value pending" id="login-status">检查中...</span>
    </div>
  </div>

  <div class="section">
    <button id="clear-cache">清除缓存</button>
    <div id="status-msg"></div>
  </div>

  <div class="footer">Song Comment Extension</div>

  <script src="popup.js"></script>
</body>
</html>
